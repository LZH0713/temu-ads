<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Temu Ads ROAS Column Harness</title>
    <style>
      body {
        margin: 16px;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      table {
        width: 1500px;
        table-layout: fixed;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 10px;
        border: 1px solid #dbe2ec;
        text-align: left;
        vertical-align: top;
      }

      .harness-controls {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 12px;
      }

      .harness-controls button {
        padding: 6px 10px;
      }

      .harness-controls output {
        color: #475569;
        font-size: 12px;
      }
    </style>
    <script>
      const storageState = {
        sync: {
          enabled: true,
          temuMallId: "",
          temuAntiContent: "",
          temuOnlyOngoing: true,
          defaultCost: "80",
          rowSelector: "",
          spuSelector: "",
          targetRoasSelector: ""
        },
        local: {
          costBySpu: {},
          targetRoasBySpu: {}
        }
      };

      window.chrome = {
        runtime: {
          onMessage: {
            addListener() {}
          }
        },
        storage: {
          sync: {
            get(defaults, callback) {
              callback({ ...defaults, ...storageState.sync });
            },
            set(values, callback) {
              storageState.sync = { ...storageState.sync, ...values };
              callback?.();
            }
          },
          local: {
            get(defaults, callback) {
              callback({ ...defaults, ...storageState.local });
            },
            set(values, callback) {
              storageState.local = { ...storageState.local, ...values };
              callback?.();
            }
          },
          onChanged: {
            addListener() {}
          }
        }
      };
    </script>
    <script src="../src/temu-price.js"></script>
    <script src="../src/roas.js"></script>
    <script src="../src/plugin-config.js"></script>
    <script src="../src/cost-sync.js"></script>
  </head>
  <body>
    <div class="harness-controls">
      <button type="button" data-testid="simulate-page-change">模拟翻页错位</button>
      <output data-testid="helper-placement-status"></output>
    </div>

    <table>
      <colgroup>
        <col style="width: 40px">
        <col style="width: 40px">
        <col style="width: 360px">
        <col style="width: 90px">
        <col style="width: 140px">
        <col style="width: 100px">
        <col style="width: 100px">
      </colgroup>
      <thead>
        <tr>
          <th></th>
          <th></th>
          <th>商品推广</th>
          <th>状态</th>
          <th>预算和出价</th>
          <th>操作</th>
          <th>总花费</th>
        </tr>
      </thead>
    </table>

    <table>
      <colgroup>
        <col style="width: 40px">
        <col style="width: 40px">
        <col style="width: 360px">
        <col style="width: 90px">
        <col style="width: 140px">
        <col style="width: 100px">
        <col style="width: 100px">
      </colgroup>
      <tbody>
        <tr>
          <td colspan="3">共1项</td>
          <td></td>
          <td></td>
          <td></td>
          <td>¥22.67</td>
        </tr>
        <tr data-testid="promotion-row">
          <td><input type="checkbox"></td>
          <td></td>
          <td>
            <strong>测试商品</strong>
            <div>商品ID: 606390743612085</div>
            <div>申报价:¥118.79~¥118.79</div>
            <div>SPU ID: 6026781341</div>
          </td>
          <td>投放中</td>
          <td>
            <div>推广日预算: 不限</div>
            <div>目标ROAS: 11</div>
          </td>
          <td>详情 数据 更多</td>
          <td>¥22.67</td>
        </tr>
      </tbody>
    </table>

    <div role="dialog" aria-modal="true">
      <h2>选择要推广的商品</h2>
      <table data-testid="dialog-product-table">
        <colgroup>
          <col style="width: 40px">
          <col style="width: 360px">
          <col style="width: 120px">
          <col style="width: 120px">
        </colgroup>
        <thead>
          <tr>
            <th></th>
            <th>商品信息</th>
            <th>站点</th>
            <th>销量</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><input type="checkbox"></td>
            <td>
              <strong>弹框商品</strong>
              <div>商品ID: 601104440666769</div>
              <div>SPU ID: 9401217708</div>
              <div>申报价:¥130.00~¥141.24</div>
            </td>
            <td>泰国等91个站点</td>
            <td>82</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="../src/content.js"></script>
    <script>
      const EXPECTED_HELPER_KEYS = [
        "price",
        "cost",
        "grossProfit",
        "target",
        "breakEven",
        "status"
      ];

      function getPromotionRow() {
        return document.querySelector("[data-testid='promotion-row']");
      }

      function readHelperPlacement() {
        const row = getPromotionRow();
        const sourceCells = Array.from(row.children).filter(
          (cell) => !cell.dataset.temuRoasHelperColumn
        );
        const budgetCell = sourceCells.find((cell) =>
          /推广日预算|目标ROAS/i.test(cell.textContent)
        );
        const afterBudgetKeys = readSequentialHelperKeys(
          budgetCell?.nextElementSibling
        );
        const cellKeys = Array.from(
          row.querySelectorAll(":scope > [data-temu-roas-helper-column]")
        ).map((cell) => cell.dataset.temuRoasHelperColumn);

        const bodyColgroup = row.closest("table").querySelector("colgroup");
        const sourceCols = Array.from(bodyColgroup.children).filter(
          (column) => !column.dataset.temuRoasHelperColumn
        );
        const afterBudgetColKeys = readSequentialHelperKeys(
          sourceCols[4]?.nextElementSibling
        );

        return {
          afterBudgetColKeys,
          afterBudgetKeys,
          cellKeys,
          isAligned:
            sameKeys(afterBudgetKeys, EXPECTED_HELPER_KEYS) &&
            sameKeys(afterBudgetColKeys, EXPECTED_HELPER_KEYS)
        };
      }

      function readSequentialHelperKeys(node) {
        const keys = [];
        let current = node;
        while (current?.dataset?.temuRoasHelperColumn) {
          keys.push(current.dataset.temuRoasHelperColumn);
          current = current.nextElementSibling;
        }
        return keys;
      }

      function sameKeys(left, right) {
        return left.length === right.length && left.every((key, index) => key === right[index]);
      }

      function simulatePageChangeMisalignment() {
        const row = getPromotionRow();
        const helperCells = Array.from(
          row.querySelectorAll(":scope > [data-temu-roas-helper-column]")
        );
        const sourceCells = Array.from(row.children).filter(
          (cell) => !cell.dataset.temuRoasHelperColumn
        );
        const cellAnchor = sourceCells[1] || null;
        for (const cell of helperCells) {
          row.insertBefore(cell, cellAnchor);
        }

        const bodyColgroup = row.closest("table").querySelector("colgroup");
        const helperCols = Array.from(
          bodyColgroup.querySelectorAll("col[data-temu-roas-helper-column]")
        );
        const sourceCols = Array.from(bodyColgroup.children).filter(
          (column) => !column.dataset.temuRoasHelperColumn
        );
        const colAnchor = sourceCols[1] || null;
        for (const column of helperCols) {
          bodyColgroup.insertBefore(column, colAnchor);
        }

        row.querySelector("strong").textContent = "翻页后的测试商品";
        updatePlacementStatus();
      }

      function updatePlacementStatus() {
        const status = document.querySelector(
          "[data-testid='helper-placement-status']"
        );
        const placement = readHelperPlacement();
        status.textContent = placement.isAligned
          ? "辅助列位置正常"
          : "辅助列位置错位";
        return placement;
      }

      document
        .querySelector("[data-testid='simulate-page-change']")
        .addEventListener("click", () => {
          simulatePageChangeMisalignment();
          window.setTimeout(updatePlacementStatus, 500);
        });

      window.__temuColumnHarness = {
        readHelperPlacement,
        simulatePageChangeMisalignment,
        updatePlacementStatus
      };
    </script>
  </body>
</html>
